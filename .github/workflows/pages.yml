name: Build & Publish Docs

on:
  push:
    branches: [ main ]   # or your default branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Sphinx + theme
        run: |
          python -m pip install --upgrade pip
          pip install sphinx furo || pip install sphinx alabaster

      - name: Build all Sphinx projects under */docs
        shell: bash
        run: |
          set -euo pipefail
          # find all docs dirs up to 4 levels deep (adjust as needed)
          mapfile -t DOCS < <(find . -type d -name docs -maxdepth 4 | sort)
          for D in "${DOCS[@]}"; do
            echo "==> Building $D"
            ( cd "$D" && sphinx-build -b html . _build/html )
          done

      - name: Assemble site folder
        shell: bash
        run: |
          mkdir -p _site
          mapfile -t DOCS < <(find . -type d -name docs -maxdepth 4 | sort)
          INDEX="_site/index.html"
          echo '<!doctype html><meta charset="utf-8"><title>Docs</title><h1>Docs</h1><ul>' > "$INDEX"
          for D in "${DOCS[@]}"; do
            # mount each docs site under its package path, e.g. intro/adcTool
            PKG_PATH="$(dirname "$D")"
            DEST="_site/${PKG_PATH#./}"
            if [ -d "$D/_build/html" ]; then
              mkdir -p "$DEST"
              cp -R "$D/_build/html/"* "$DEST/"
              echo "<li><a href='${PKG_PATH#./}/'>${PKG_PATH#./}/</a></li>" >> "$INDEX"
            fi
          done
          echo '</ul>' >> "$INDEX"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
