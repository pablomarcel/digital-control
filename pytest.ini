# pytest.ini (repo root)
[pytest]
# Where to look for tests
testpaths =
    introduction/adcTool/tests
    introduction/dacTool/tests
    introduction/demuxTool/tests
    introduction/muxTool/tests
    introduction/vcdTool/tests
    introduction/zohTool/tests
    kalman_filters/kalmanFilterTool/tests
    pole_placement/controllabilityTool/tests
    pole_placement/observabilityTool/tests
    pole_placement/observerTool/tests
    pole_placement/poleTool/tests
    pole_placement/servoTool/tests
    pole_placement/transformationTool/tests
    polynomial_equations/polynomialTool/tests
    quadratic_control/quadraticTool/tests
    rst_controllers/rstTool/tests
    rst_controllers/rstPlotTool/tests
    state_space/liapunovTool/tests
    state_space/stateConverterTool/tests
    state_space/stateSolverTool/tests
    state_space/stateSpaceTool/tests
    system_design/frequencyResponseTool/tests
    system_design/juryTestTool/tests
    system_design/zGridTool/tests
    z_plane_analysis/discreteResponseTool/tests
    z_transform/zTransformTool/tests

# Default options:
# -vv : very verbose test names
# -ra : show summary of skips/xfails
# --durations=10 : slowest 10 tests
# pytest.ini
addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=intro
    --cov=kalman_filters
    --cov=pole_placement
    --cov=polynomial_equations
    --cov=quadratic_control
    --cov=rst_controllers
    --cov=state_space
    --cov=system_design
    --cov=z_plane_analysis
    --cov=z_transform
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60


# Live logging to console (use logging.* in tests)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Make xfail strict so accidental passes are flagged
xfail_strict = true

# Register custom markers
markers =
    cf: closed-form / symbolic tests
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch job tests

# Tame 3rd-party deprecation noise but keep our own strict
filterwarnings =
    error::DeprecationWarning:transientAnalysis\..*
    error::DeprecationWarning:rootLocus\..*
    ignore::DeprecationWarning
