# pytest.ini (repo root)
[pytest]
# Where to look for tests
testpaths =
    intro/adcTool/tests
    intro/dacTool/tests
    intro/demuxTool/tests
    intro/muxTool/tests
    intro/vcdTool/tests
    intro/zohTool/tests
    kalmanFilters/kalmanFilterTool/tests
    polePlacement/controllabilityTool/tests
    polePlacement/observabilityTool/tests
    polePlacement/observerTool/tests
    polePlacement/poleTool/tests
    polePlacement/servoTool/tests
    polePlacement/transformationTool/tests
    polynomialEquations/polynomialTool/tests
    quadraticControl/quadraticTool/tests
    rstControllers/rstTool/tests
    rstControllers/rstPlotTool/tests
    stateSpace/liapunovTool/tests
    stateSpace/stateConverterTool/tests
    stateSpace/stateSolverTool/tests
    stateSpace/stateSpaceTool/tests
    systemDesign/frequencyResponseTool/tests
    systemDesign/juryTestTool/tests
    systemDesign/zGridTool/tests
    zPlaneAnalysis/discreteResponseTool/tests
    zTransform/zTransformTool/tests

# Default options:
# -vv : very verbose test names
# -ra : show summary of skips/xfails
# --durations=10 : slowest 10 tests
# pytest.ini
addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=intro
    --cov=kalmanFilters
    --cov=polePlacement
    --cov=polynomialEquations
    --cov=quadraticControl
    --cov=rstControllers
    --cov=stateSpace
    --cov=systemDesign
    --cov=zPlaneAnalysis
    --cov=zTransform
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60


# Live logging to console (use logging.* in tests)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Make xfail strict so accidental passes are flagged
xfail_strict = true

# Register custom markers
markers =
    cf: closed-form / symbolic tests
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch job tests

# Tame 3rd-party deprecation noise but keep our own strict
filterwarnings =
    error::DeprecationWarning:transientAnalysis\..*
    error::DeprecationWarning:rootLocus\..*
    ignore::DeprecationWarning
